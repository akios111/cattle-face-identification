dataset:
  repo_url: "https://github.com/MachineLearningVisionRG/CattleSSFR.git"
  commit_sha: ""
  raw_dir: "/content/cattle_runtime/raw/CattleSSFR"
  image_subdir: "cattle_images"
  expected_images: 311

preprocessing:
  image_size: [384, 384]

augmentation:
  profile: "all"

split:
  protocol: "paper_random"
  alternatives:
    - "paper_random"
    - "transform_holdout"

training:
  epochs: 35
  batch_size: 128
  learning_rate: 0.001
  optimizer: "adamw"
  weight_decay: 0.0001
  dropout: 0.35
  seed: 2026
  dataset_cache: "memory"
  steps_per_execution: 16
  jit_compile: true
  checkpoint_metric: "val_accuracy"
  acceleration:
    mixed_precision: "auto"
    xla: true
  early_stopping:
    enabled: true
    monitor: "val_loss"
    patience: 10
  fine_tune:
    enabled: true
    epochs: 45
    learning_rate: 0.00001
    trainable_last_n: 80
    freeze_batchnorm: true

output:
  processed_dir: "/content/cattle_runtime/processed"
  metadata_dir: "artifacts/metadata"
  run_dir: "artifacts/runs"
