version: 2
purpose: holstein_controls_hardening_v2
base_config: configs/holstein2025_colab_proplus.yaml

job_defaults:
  kind: evaluate
  model: efficientnetv2b3
  evaluation: holstein2025_zero_shot_reid_hardening_v2
  split_seed: 1
  augmentation_seed: 1
  protocol_version: hardening_v2
  metadata: artifacts/metadata/holstein2025_open_set.csv

jobs:
  - {control_type: imagenet_only, source_protocol: imagenet_only, training_seed: 0}

  - {control_type: frozen, source_protocol: ablation_frozen_hardening_v2, training_seed: 1}
  - {control_type: frozen, source_protocol: ablation_frozen_hardening_v2, training_seed: 2}
  - {control_type: frozen, source_protocol: ablation_frozen_hardening_v2, training_seed: 3}
  - {control_type: frozen, source_protocol: ablation_frozen_hardening_v2, training_seed: 4}
  - {control_type: frozen, source_protocol: ablation_frozen_hardening_v2, training_seed: 5}

  - {control_type: fine_tuned, source_protocol: paper_random_hardening_v2, training_seed: 1}
  - {control_type: fine_tuned, source_protocol: paper_random_hardening_v2, training_seed: 2}
  - {control_type: fine_tuned, source_protocol: paper_random_hardening_v2, training_seed: 3}
  - {control_type: fine_tuned, source_protocol: paper_random_hardening_v2, training_seed: 4}
  - {control_type: fine_tuned, source_protocol: paper_random_hardening_v2, training_seed: 5}

  - {control_type: fine_tuned, source_protocol: transform_holdout_hardening_v2, training_seed: 1}
  - {control_type: fine_tuned, source_protocol: transform_holdout_hardening_v2, training_seed: 2}
  - {control_type: fine_tuned, source_protocol: transform_holdout_hardening_v2, training_seed: 3}
  - {control_type: fine_tuned, source_protocol: transform_holdout_hardening_v2, training_seed: 4}
  - {control_type: fine_tuned, source_protocol: transform_holdout_hardening_v2, training_seed: 5}

output:
  jobs_json: artifacts/matrix/experiment_matrix_holstein_hardening_v2_jobs.json
  progress_json: artifacts/matrix/holstein_hardening_v2_progress.json
